backend = "pp_doclayout_v3_preprocess"
max_batch_size = 0
required_paths = [
  "backends/pp_doclayout_v3_preprocess/libtriton_pp_doclayout_v3_preprocess.so",
]

[[inputs]]
name = "image"
dtype = "TYPE_STRING"
dims = [1]

[[outputs]]
name = "im_shape"
dtype = "TYPE_FP32"
dims = [-1, 2]

[[outputs]]
name = "image"
dtype = "TYPE_FP32"
dims = [-1, 3, 800, 800]

[[outputs]]
name = "scale_factor"
dtype = "TYPE_FP32"
dims = [-1, 2]
