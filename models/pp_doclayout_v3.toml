schema_version = 1

[model]
name = "pp_doclayout_v3"
model_type = "pp_doclayout_v3"
root = "artifacts/pp_doclayout_v3"

[model.artifacts.onnx]
kind = "onnx_model"
path = "onnx"
build = "onnx"

[model.artifacts.ort_cuda]
kind = "onnxruntime_bundle"
path = "ort_cuda"
build = "ort_cuda"

[model.artifacts.ort_trt]
kind = "onnxruntime_bundle"
path = "trt"
build = "ort_trt"

[model.artifacts.ort_trt_fp16]
kind = "onnxruntime_bundle"
path = "trt_fp16"
build = "ort_trt_fp16"

[model.artifacts.triton_ort_cuda]
kind = "triton_model"
path = "triton_ort_cuda/pp_doclayout_v3"
build = "triton_ort_cuda"

[model.artifacts.triton_ort_trt]
kind = "triton_model"
path = "triton_ort_trt/pp_doclayout_v3"
build = "triton_ort_trt"

[model.artifacts.triton_ort_trt_fp16]
kind = "triton_model"
path = "triton_ort_trt_fp16/pp_doclayout_v3"
build = "triton_ort_trt_fp16"

[model.artifacts.triton_service_ort_trt]
kind = "triton_repo"
path = "triton_service_ort_trt"
build = "triton_service_ort_trt"

[model.artifacts.triton_service_ort_trt_python]
kind = "triton_repo"
path = "triton_service_ort_trt_python"
build = "triton_service_ort_trt_python"

[model.build_profiles.onnx]
builder = "fetch-huggingface"
repo_id = "PaddlePaddle/PP-DocLayoutV3_onnx"
revision = "main"
output = "onnx"
file = "inference.onnx"

[model.build_profiles.ort_cuda]
builder = "onnxruntime-bundle"
input = "onnx"
output = "ort_cuda"
providers = ["CUDAExecutionProvider"]
outputs = ["fetch_name_0", "fetch_name_1"]

[model.build_profiles.ort_trt]
builder = "onnxruntime-bundle"
input = "onnx"
output = "ort_trt"
providers = ["TensorrtExecutionProvider", "CUDAExecutionProvider"]
outputs = ["fetch_name_0", "fetch_name_1"]

[model.build_profiles.ort_trt.provider_options.TensorrtExecutionProvider]
trt_engine_cache_enable = true
trt_engine_cache_path = "ort_trt_cache"
trt_engine_cache_prefix = "pp_doclayout_v3_ort_trt"
trt_min_subgraph_size = 200

[model.build_profiles.ort_trt_fp16]
builder = "onnxruntime-bundle"
input = "onnx"
output = "ort_trt_fp16"
providers = ["TensorrtExecutionProvider", "CUDAExecutionProvider"]
outputs = ["fetch_name_0", "fetch_name_1"]

[model.build_profiles.ort_trt_fp16.onnx_transform]
precision = "fp16"
keep_io_fp32 = true

[model.build_profiles.ort_trt_fp16.provider_options.TensorrtExecutionProvider]
trt_engine_cache_enable = true
trt_engine_cache_path = "ort_trt_cache"
trt_engine_cache_prefix = "pp_doclayout_v3_ort_trt_fp16"
trt_min_subgraph_size = 200

[model.build_profiles.triton_ort_cuda]
builder = "triton-onnx"
input = "ort_cuda"
output = "triton_ort_cuda"
model_name = "pp_doclayout_v3"
version = 1
max_batch_size = 0

[model.build_profiles.triton_ort_trt]
builder = "triton-onnx"
input = "ort_trt"
output = "triton_ort_trt"
model_name = "pp_doclayout_v3"
version = 1
max_batch_size = 0

[model.build_profiles.triton_ort_trt_fp16]
builder = "triton-onnx"
input = "ort_trt_fp16"
output = "triton_ort_trt_fp16"
model_name = "pp_doclayout_v3"
version = 1
max_batch_size = 0

[model.build_profiles.triton_service_ort_trt]
builder = "triton-repo"
output = "triton_service_ort_trt"
model_name = "pp_doclayout_v3"
version = 1
max_batch_size = 0

[model.build_profiles.triton_service_ort_trt.preprocess]
source = "serving/triton/preprocessors/pp_doclayout_v3"
model_name = "pp_doclayout_v3_preprocess"
version = 1

[model.build_profiles.triton_service_ort_trt.preprocess.output_map]
image = "preprocessed_image"

[model.build_profiles.triton_service_ort_trt.infer]
input = "ort_trt"
model_name = "pp_doclayout_v3_infer"
version = 1
max_batch_size = 0

[model.build_profiles.triton_service_ort_trt.infer.input_map]
image = "preprocessed_image"

[model.build_profiles.triton_service_ort_trt_python]
builder = "triton-repo"
output = "triton_service_ort_trt_python"
model_name = "pp_doclayout_v3"
version = 1
max_batch_size = 0

[model.build_profiles.triton_service_ort_trt_python.preprocess]
source = "serving/triton/preprocessors/pp_doclayout_v3_python"
model_name = "pp_doclayout_v3_preprocess"
version = 1

[model.build_profiles.triton_service_ort_trt_python.preprocess.output_map]
image = "preprocessed_image"

[model.build_profiles.triton_service_ort_trt_python.infer]
input = "ort_trt"
model_name = "pp_doclayout_v3_infer"
version = 1
max_batch_size = 0

[model.build_profiles.triton_service_ort_trt_python.infer.input_map]
image = "preprocessed_image"
